<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Question Importer | EduPulse</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="navbar dashboard-navbar">
        <a href="/" class="logo">
            <svg class="logo-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
            </svg>
            Edu<span>Pulse</span>
        </a>
        <div class="nav-links">
            <span class="user-greeting">Welcome back, <strong>Student</strong></span>
            <button class="btn-icon theme-toggle" aria-label="Toggle theme">
                <svg class="sun-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
                <svg class="moon-icon hidden" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
            </button>
            <button id="logout-btn" class="btn btn-outline btn-small">Log Out</button>
        </div>
    </header>

    <div class="dashboard-container">
        <aside class="sidebar">
            <a class="tab-btn" href="/math-generator">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                Math Generator
            </a>
            <a class="tab-btn active" href="/question-importer">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="12" y1="18" x2="12" y2="12"/><line x1="9" y1="15" x2="15" y2="15"/></svg>
                Question Importer
            </a>
            <a class="tab-btn" href="/dashboard">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
                Daily Tasks
            </a>
            <a class="tab-btn" href="/dashboard#tab-timers">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                Study Timers
            </a>
            <a class="tab-btn" href="/dashboard#tab-org">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                Organization & Cal
            </a>
        </aside>

        <main class="dashboard-content">
            <div class="pane-header">
                <h2>Text Question Importer</h2>
                <p>Paste unformatted text or exam worksheets below to structure them into assignable items.</p>
            </div>
            <textarea id="import-textarea" rows="7" placeholder="1. What is the formula for Discounted Cash Flow?&#10;2. Define row-reduced echelon form (RREF).&#10;3. Solve for x when 3x + 15 = 45..."></textarea>
            <button class="btn btn-primary" id="import-btn">Parse & Import Questions</button>
            <div id="import-results" class="results-area"></div>
        </main>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
