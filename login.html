<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | EduPulse</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="auth-body">

    <div class="auth-container fade-in">
        <div class="auth-header">
            <a href="/" class="logo">
                <svg class="logo-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
                </svg>
                Edu<span>Pulse</span>
            </a>
            <button class="btn-icon theme-toggle" aria-label="Toggle theme">
                <svg class="sun-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
                <svg class="moon-icon hidden" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
            </button>
        </div>

        <div class="card auth-card">
            <div class="auth-tabs">
                <button class="auth-tab active" data-target="form-login">Sign In</button>
                <button class="auth-tab" data-target="form-register">Create Account</button>
            </div>

            <form id="form-login" class="auth-form">
                <div class="input-group">
                    <label for="login-email">Email Address</label>
                    <input type="email" id="login-email" placeholder="name@example.com" required>
                </div>
                <div class="input-group">
                    <label for="login-pass">Password</label>
                    <input type="password" id="login-pass" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-primary btn-full">Enter Workspace</button>
            </form>

            <form id="form-register" class="auth-form hidden">
                <div class="input-group">
                    <label for="reg-name">Full Name</label>
                    <input type="text" id="reg-name" placeholder="Astin Chen">
                </div>
                <div class="input-group">
                    <label for="reg-email">Email Address</label>
                    <input type="email" id="reg-email" placeholder="name@example.com">
                </div>
                <div class="input-group">
                    <label for="reg-pass">Password</label>
                    <input type="password" id="reg-pass" placeholder="Create a strong password">
                </div>
                <button type="submit" class="btn btn-primary btn-full">Create Account</button>
            </form>

            <div class="social-login" style="margin-top:12px; display:flex; gap:8px; flex-direction:column;">
                <button id="google-signin" class="btn btn-outline btn-full" type="button">Sign in with Google</button>
            </div>

            <div class="auth-footer">
                <a href="/">← Return to Home</a>
            </div>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
